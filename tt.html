<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok</title>
    <style>
        :root {
            --tiktok-black: #010101;
            --tiktok-white: #FFFFFF;
            --tiktok-red: #FE2C55;
            --tiktok-blue: #25F4EE;
        }

        body {
            background-color: #121212;
            color: white;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .phone-container {
            width: 375px;
            height: 750px;
            background-color: var(--tiktok-black);
            border: 8px solid #333;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(0deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.2) 100%);
        }

        .right-sidebar {
            position: absolute;
            right: 10px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .icon-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .profile-pic {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid white;
            background: #444;
            margin-bottom: 10px;
        }

        .action-icon {
            width: 35px;
            height: 35px;
            fill: white;
        }

        .stat-text {
            font-size: 12px;
            font-weight: 600;
        }

        .bottom-info {
            width: 80%;
            margin-bottom: 20px;
        }

        .username {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .caption {
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .music-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .music-icon {
            width: 14px;
            fill: white;
        }

        .vinyl-record {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #333 0%, #000 100%);
            border-radius: 50%;
            position: absolute;
            right: 15px;
            bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            background-color: var(--tiktok-red);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Hier wird vid.mp4 als Standardquelle geladen -->
        <video id="video-preview" src="vid.mp4" autoplay loop muted playsinline></video>
        
        <div class="ui-overlay">
            <div class="right-sidebar">
                <div class="profile-pic"></div>
                <div class="icon-group">
                    <svg class="action-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span class="stat-text">378.5K</span>
                </div>
                <div class="icon-group">
                    <svg class="action-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="stat-text">7521</span>
                </div>
                <div class="icon-group">
                    <svg class="action-icon" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
                    <span class="stat-text">8922</span>
                </div>
                <div class="icon-group">
                    <svg class="action-icon" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                    <span class="stat-text">Share</span>
                </div>
            </div>

            <div class="bottom-info">
                <div class="username">@MStudioFan</div>
                <div class="caption">Freiheitsstatue ist jetzt im Spotify-Premium-Abo??? #Freiheitsstatue #Spotify #DigitalArt #ArtTrans...</div>
                <div class="music-info">
                    <svg class="music-icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    <span>Originalton - Freiheitsstatue</span>
                </div>
            </div>

            <div class="vinyl-record">
                <div style="width: 20px; height: 20px; background: #555; border-radius: 50%;"></div>
            </div>
        </div>
    </div>
    </div>

    <script>
        const uploadInput = document.getElementById('upload');
        const videoPreview = document.getElementById('video-preview');

        // Falls vid.mp4 nicht geladen werden kann, geben wir eine Info in die Konsole
        videoPreview.onerror = function() {
            console.error("Die Datei 'vid.mp4' wurde nicht gefunden. Bitte lade manuell ein Video hoch oder platziere die Datei im korrekten Verzeichnis.");
        };

        uploadInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                videoPreview.src = url;
                videoPreview.play();
            }
        });
    </script>
</body>
</html>
