<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Drive Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; color: #3c4043; }
        .drive-container { height: calc(100 vh - 120px); }
        .file-card { transition: all 0.2s ease; border: 1px solid #dadce0; }
        .file-card:hover { background-color: #f1f3f4; box-shadow: 0 1px 3px rgba(60,64,67,0.3); }
        .preview-overlay { background: rgba(0,0,0,0.85); display: none; }
        .iframe-wrapper { width: 90%; height: 85%; background: white; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .media-viewer img, .media-viewer video { max-width: 90vw; max-height: 80vh; border-radius: 8px; }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <svg class="w-8 h-8 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <h1 class="text-xl font-medium text-gray-700" id="driveTitle">My Drive</h1>
        </div>
        <div id="breadcrumb" class="text-sm text-gray-500 font-mono bg-gray-100 px-3 py-1 rounded-full">
            /root
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-6">
        <div id="fileGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 overflow-y-auto drive-container">
            <!-- Files will be injected here -->
            <div class="col-span-full text-center py-20 text-gray-400">Lade Dateien...</div>
        </div>
    </main>

    <!-- Preview Overlay (Fullscreen) -->
    <div id="previewOverlay" class="preview-overlay fixed inset-0 z-50 flex-col items-center justify-center">
        <div class="absolute top-4 right-6 flex gap-4">
            <a id="downloadLink" href="#" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">Download</a>
            <button onclick="closePreview()" class="text-white hover:text-gray-300 text-3xl">&times;</button>
        </div>
        <div id="previewContent" class="iframe-wrapper flex items-center justify-center">
            <!-- Preview injected here -->
        </div>
        <div id="previewName" class="mt-4 text-white font-medium text-lg"></div>
    </div>

    <script>
        // --- KONFIGURATION ---
        const GITHUB_USER = "gamer752redit"; // Hier User eintragen
        const GITHUB_REPO = "mstudio-praktikum"; // Hier Repo eintragen
        // ---------------------

        let currentPath = "";

        // Initialer Start
        document.getElementById('driveTitle').innerText = GITHUB_REPO;
        loadFolder("");

        async function loadFolder(path) {
            const grid = document.getElementById('fileGrid');
            const breadcrumb = document.getElementById('breadcrumb');
            currentPath = path;
            breadcrumb.innerText = "/" + path;
            
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${path}`);
                const data = await response.json();

                if (!Array.isArray(data)) throw new Error("Keine Daten gefunden.");

                grid.innerHTML = "";

                // Zurück-Button
                if (path !== "") {
                    addFileIcon("..", "folder", () => {
                        const parts = path.split('/');
                        parts.pop();
                        loadFolder(parts.join('/'));
                    });
                }

                data.forEach(item => {
                    addFileIcon(item.name, item.type, () => {
                        if (item.type === 'dir') loadFolder(item.path);
                        else openPreview(item);
                    });
                });

            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-red-500 p-10">Fehler: ${err.message}</div>`;
            }
        }

        function addFileIcon(name, type, onClick) {
            const card = document.createElement('div');
            card.className = "file-card bg-white p-4 rounded-lg flex flex-col items-center justify-center cursor-pointer text-center";
            card.onclick = onClick;

            let icon = '';
            if (type === 'dir' || type === 'folder') {
                icon = `<svg class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>`;
            } else {
                const ext = name.split('.').pop().toLowerCase();
                if (['png', 'jpg', 'jpeg'].includes(ext)) icon = `<svg class="w-12 h-12 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"></path></svg>`;
                else if (ext === 'mp4') icon = `<svg class="w-12 h-12 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path><path d="M8 8l5 3-5 3V8z"></path></svg>`;
                else if (ext === 'html') icon = `<svg class="w-12 h-12 text-orange-400" fill="currentColor" viewBox="0 0 20 20"><path d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z"></path></svg>`;
                else icon = `<svg class="w-12 h-12 text-gray-300" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A1 1 0 0111.293 2.293l4.414 4.414a1 1 0 01.293.707V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"></path></svg>`;
            }

            card.innerHTML = `${icon} <span class="text-sm mt-2 truncate w-full px-2">${name}</span>`;
            document.getElementById('fileGrid').appendChild(card);
        }

        async function openPreview(file) {
            const overlay = document.getElementById('previewOverlay');
            const content = document.getElementById('previewContent');
            const nameLabel = document.getElementById('previewName');
            const dl = document.getElementById('downloadLink');
            
            overlay.style.display = "flex";
            nameLabel.innerText = file.name;
            dl.href = file.download_url;
            content.innerHTML = '<p class="text-white">Lade Vorschau...</p>';

            const ext = file.name.split('.').pop().toLowerCase();

            if (ext === 'html') {
                const res = await fetch(file.download_url);
                const html = await res.text();
                content.innerHTML = '<iframe id="htmlFrame"></iframe>';
                const frame = document.getElementById('htmlFrame');
                frame.contentWindow.document.open();
                frame.contentWindow.document.write(html);
                frame.contentWindow.document.close();
            } else if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) {
                content.innerHTML = `<div class="media-viewer"><img src="${file.download_url}"></div>`;
            } else if (ext === 'mp4') {
                content.innerHTML = `<div class="media-viewer"><video controls autoplay src="${file.download_url}"></video></div>`;
            } else {
                content.innerHTML = `<div class="text-white text-center">Keine Vorschau verfügbar für .${ext}<br><br><span class="text-gray-400">${file.name}</span></div>`;
            }
        }

        function closePreview() {
            document.getElementById('previewOverlay').style.display = "none";
            document.getElementById('previewContent').innerHTML = "";
        }
    </script>
</body>
</html>
