<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Explorer & Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .preview-container iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ddd;
            background: white;
        }
        .media-preview img, .media-preview video {
            max-width: 100%;
            max-height: 500px;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 border-b border-gray-700 pb-2">GitHub Repository Previewer</h1>
        
        <!-- Input Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <input type="text" id="repoOwner" placeholder="Besitzer (z.B. google)" class="bg-gray-800 p-2 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
            <input type="text" id="repoName" placeholder="Repository (z.B. material-design-lite)" class="bg-gray-800 p-2 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
            <button onclick="loadContents('')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">Laden</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- File Explorer -->
            <div class="bg-gray-800 p-4 rounded-lg shadow-xl">
                <h2 class="text-xl font-semibold mb-4 flex justify-between items-center">
                    Dateien
                    <span id="currentPath" class="text-sm text-gray-400 font-mono">/</span>
                </h2>
                <ul id="fileList" class="space-y-2 max-h-[600px] overflow-y-auto">
                    <!-- Dynamic Content -->
                </ul>
            </div>

            <!-- Preview Panel -->
            <div id="previewPanel" class="bg-gray-800 p-4 rounded-lg shadow-xl hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Vorschau</h2>
                    <a id="downloadBtn" href="#" target="_blank" class="text-sm bg-green-600 hover:bg-green-500 px-3 py-1 rounded">Download</a>
                </div>
                <div id="previewContent" class="preview-container flex justify-center items-center">
                    <!-- Preview content goes here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadContents(path = '') {
            const owner = document.getElementById('repoOwner').value;
            const repo = document.getElementById('repoName').value;
            if (!owner || !repo) return alert("Bitte Besitzer und Repo angeben!");

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            document.getElementById('currentPath').innerText = path || '/';

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (response.status !== 200) throw new Error(data.message);

                const fileList = document.getElementById('fileList');
                fileList.innerHTML = '';

                // Zurück-Button wenn im Unterordner
                if (path) {
                    const parentPath = path.split('/').slice(0, -1).join('/');
                    addListItem('.. (Zurück)', () => loadContents(parentPath), '📁');
                }

                data.forEach(item => {
                    const icon = item.type === 'dir' ? '📁' : '📄';
                    addListItem(item.name, () => {
                        if (item.type === 'dir') {
                            loadContents(item.path);
                        } else {
                            showPreview(item);
                        }
                    }, icon);
                });
            } catch (err) {
                alert("Fehler: " + err.message);
            }
        }

        function addListItem(name, onClick, icon) {
            const li = document.createElement('li');
            li.className = "p-2 hover:bg-gray-700 rounded cursor-pointer flex items-center transition";
            li.innerHTML = `<span class="mr-3">${icon}</span> <span class="truncate">${name}</span>`;
            li.onclick = onClick;
            document.getElementById('fileList').appendChild(li);
        }

        async function showPreview(file) {
            const panel = document.getElementById('previewPanel');
            const container = document.getElementById('previewContent');
            const downloadBtn = document.getElementById('downloadBtn');
            
            panel.classList.remove('hidden');
            container.innerHTML = '<p class="text-gray-400">Lade Vorschau...</p>';
            downloadBtn.href = file.download_url;

            const ext = file.name.split('.').pop().toLowerCase();

            if (ext === 'html') {
                // HTML Preview via iFrame
                const response = await fetch(file.download_url);
                const html = await response.text();
                const iframe = document.createElement('iframe');
                container.innerHTML = '';
                container.appendChild(iframe);
                iframe.contentWindow.document.open();
                iframe.contentWindow.document.write(html);
                iframe.contentWindow.document.close();
            } 
            else if (['png', 'jpg', 'jpeg', 'gif', 'svg'].includes(ext)) {
                container.innerHTML = `<div class="media-preview"><img src="${file.download_url}" alt="${file.name}"></div>`;
            } 
            else if (ext === 'mp4') {
                container.innerHTML = `<div class="media-preview"><video controls src="${file.download_url}"></video></div>`;
            } 
            else {
                container.innerHTML = `<div class="text-center p-8 bg-gray-900 rounded border border-dashed border-gray-600">
                    <p class="mb-2">Keine Live-Vorschau für .${ext} verfügbar.</p>
                    <code class="text-xs text-blue-400">${file.name}</code>
                </div>`;
            }
        }
    </script>
</body>
</html>
